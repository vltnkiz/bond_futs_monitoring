[pytest]
testpaths = tests
python_files = test_*.py bench_*.py perf_*.py
python_classes = Test* Bench* Perf*
python_functions = test_* bench_* perf_*
markers =
    benchmark: speed-of-computation tests (pytest-benchmark)
    performance: high-load / stress tests
addopts = -m "not benchmark and not performance"
